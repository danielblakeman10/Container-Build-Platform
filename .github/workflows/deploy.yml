name: Deploy nginx to Fargate

on:
  push:
    branches:
      - dev
    paths:
      - "nginx/**"
      - "terraform/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - dev
    paths:
      - "nginx/**"
      - "terraform/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: us-east-1
  ARTIFACT_ECR_REPOSITORY: man-cbp/nginx
  TERRAFORM_VERSION: 1.15.7

jobs:
  validate:
    name: Validate Terraform and IaC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          AWS_EC2_METADATA_DISABLED: true
          AWS_SKIP_CREDENTIALS_VALIDATION: true
        run: |
          terraform init -backend=false
          terraform validate

      - name: Run Checkov static analysis
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true

  build:
    name: Build and push immutable image
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: dev
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ARTIFACT_ECR_REPOSITORY:$IMAGE_TAG" ./nginx
          docker push "$ECR_REGISTRY/$ARTIFACT_ECR_REPOSITORY:$IMAGE_TAG"
          echo "image_uri=$ECR_REGISTRY/$ARTIFACT_ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy-dev:
    name: Deploy dev
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform init -reconfigure -backend-config="key=man-cbp/dev/terraform.tfstate"
          terraform apply -auto-approve \
            -var-file="environments/dev.tfvars" \
            -var="container_image=${{ needs.build.outputs.image_uri }}"

  deploy-uat:
    name: Promote to uat
    needs: [build, deploy-dev]
    runs-on: ubuntu-latest
    environment:
      name: uat
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform init -reconfigure -backend-config="key=man-cbp/uat/terraform.tfstate"
          terraform apply -auto-approve \
            -var-file="environments/uat.tfvars" \
            -var="container_image=${{ needs.build.outputs.image_uri }}"

  deploy-prod:
    name: Promote to prod
    needs: [build, deploy-uat]
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform init -reconfigure -backend-config="key=man-cbp/terraform.tfstate"
          terraform apply -auto-approve \
            -var-file="environments/prod.tfvars" \
            -var="container_image=${{ needs.build.outputs.image_uri }}"

  sync-branches:
    name: Fast-forward uat/prod/main to dev
    needs: deploy-prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward branches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for branch in uat prod main; do
            git checkout "$branch"
            git merge --ff-only origin/dev
            git push origin "$branch"
          done