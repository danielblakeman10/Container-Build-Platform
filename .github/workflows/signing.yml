# Image Signing Workflow

name: Sign Container Images

on:
  workflow_run:
    workflows: ["Container Build Pipeline"]
    types:
      - completed
    branches: [main, master]

permissions:
  contents: read
  packages: write

jobs:
  sign-image:
    name: Sign Image with Cosign
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.2'

      - name: Get Image Digest
        id: get-digest
        run: |
          REPO="${{ secrets.ECR_REPO }}"
          DIGEST=$(aws ecr describe-images \
            --repository-name "$REPO" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'images[0].imageDigest' \
            --output text)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
          COSIGN_YAML: ${{ secrets.COSIGN_YAML }}
        run: |
          REPO="${{ secrets.ECR_REPO }}"
          IMAGE="${{ secrets.ECR_REGISTRY }}/${REPO}@${{ steps.get-digest.outputs.digest }}"
          
          echo "Signing image: $IMAGE"
          cosign sign --yes "$IMAGE"
          
          echo ""
          echo "Image signed successfully!"
          echo "Verification command:"
          echo "  cosign verify --key cosign.pub --allow-bundle $IMAGE"

      - name: Generate SBOM
        run: |
          REPO="${{ secrets.ECR_REPO }}"
          IMAGE="${{ secrets.ECR_REGISTRY }}/${REPO}@${{ steps.get-digest.outputs.digest }}"
          
          trivy image \
            --format spdx-json \
            --output sbom.spdx.json \
            "$IMAGE"
          
          cosign attach sbom \
            --sbom sbom.spdx.json \
            --type spdx \
            "$IMAGE"

      - name: Upload signing artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signing-artifacts
          path: |
            sbom.spdx.json
            cosign.pub
          retention-days: 90
